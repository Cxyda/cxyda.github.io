# Site settings
title:          cxyda.github.io
description:    "A game development blog about c# and Unity3D"
baseurl:        ""
url:          "https://cxyda.github.io" 

# https://jekyllrb.com/docs/configuration/options/
timezone: Asia/Kolkata

# Google Analytics
google_analytics: UA-43339302-11

# Author
#   This is the default author name displayed on all posts, can be overridden by setting a different `author: Your Name`
#   in the frontmatter
author:
  name:         Daniel Steegmüller

# Build settings
markdown:       kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  
include:
  - _pages

# Assets
sass:
  sass_dir:     /assets/css/_sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-gist

# Permalinks
permalink:      /:title
paginate:       5

# Excludes
exclude:
  - README.md
  - LICENSE.md

# Disqus (legacy, replaced by Giscus)
disqus: cxyda_github_io

# Giscus Comments (GitHub Discussions-backed)
# To set up: 1) Enable Discussions on your repo 2) Install https://giscus.app 3) Fill in IDs from giscus.app
giscus:
  repo: "cxyda/cxyda.github.io"
  repo_id: "R_kgDONQVCCg"
  category: "General"
  category_id: "DIC_kwDONQVCCs4C4oon"
